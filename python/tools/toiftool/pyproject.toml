[build-system]
requires = ["flit_core >= 3.11,<5"]
build-backend = "flit_core.buildapi"

[project]
name = "toiftool"
version = "0.1.0"
description = ""
authors = [{ name = "matejcik", email = "ja@matejcik.cz" }]
requires-python = ">=3.8"
readme = "README.md"
dependencies = [
    "trezor>=0.13",
    "click>=7.0,<9.0",
    "Pillow>=10.0.1",
]

[project.scripts]
toiftool = "toiftool:cli"

[tool.uv]
exclude-newer = "30 days"
