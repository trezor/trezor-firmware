[tox]
envlist =
    py{39,310,311,312,313,314}-{minimal,default,full}
    py{39,310,311,312,313,314}-click8{0,1}
    py{310,311,312,313,314}-click82

# workaround https://github.com/tox-dev/tox/pull/3966
skip_missing_interpreters = false

[testenv]
runner = uv-venv-runner
dependency_groups =
    !minimal: dev
extras =
    full: full
commands =
    # Working in the local directory, try to compile all bytecode
    python -m compileall src tests
    # Smoke-test trezorctl
    trezorctl --help
    # Run test suite
    !minimal: pytest -c setup.cfg --random-order tests

[testenv:py{39,310,311,312,313,314}-click{80,81,82}]
commands =
    click80: uv pip install "click>=8.0,<8.1"
    click81: uv pip install "click>=8.1,<8.2"
    click82: uv pip install "click>=8.2,<8.3"
    # Smoke-test trezorctl
    trezorctl --version
