name: Hardware tests
run-name: Hardware tests on ${{ inputs.models_json != '' && join(fromJSON(inputs.models_json), ', ') || 'all models' }}

on:
  schedule:
    - cron: '15 23 * * *'  # every day @ 23:15
  workflow_dispatch:
    inputs:
      models_json:
        description: models as a JSON list
        type: string
        required: true
        default: "[\"T1B1\",\"T2B1\",\"T2T1\",\"T3B1\",\"T3T1\",\"T3W1\"]"

permissions:
  contents: read        # for actions/checkout

# [Device tests](../tests/device-tests.md) that run against an actual physical Trezors.
# The device needs to have special bootloader, found in `core/embed/projects/bootloader_ci`, that
# makes it possible to flash firmware without confirmation on the touchscreen.
#
# All hardware tests are run nightly on the `main` branch,
# and also can be started manually.
#
# Currently it's not possible to run all regular TT tests without getting into
# a state where the micropython heap is too fragmented and allocations fail
# (often manifesting as a stuck test case). For that reason some tests are
# skipped.
# See also: https://github.com/trezor/trezor-firmware/issues/1371
jobs:
  param:
    name: Determine pipeline parameters
    runs-on: ubuntu-latest
    outputs:
      core_models: ${{ steps.set_vars.outputs.core_models }}
      run_legacy: ${{ steps.set_vars.outputs.run_legacy }}
    steps:
      - id: set_vars
        name: Set variables
        env:
          MODELS: ${{ github.event_name == 'workflow_dispatch' && inputs.models_json || '["T1B1","T2B1","T2T1","T3B1","T3T1","T3W1"]' }}
        run: |
          echo "models_json: $MODELS"
          CORE_MODELS=`echo $MODELS | jq -cM '[.[] | select(. != "T1B1")]'`
          echo core_models=$CORE_MODELS >> $GITHUB_OUTPUT
          if echo $MODELS | grep -q '"T1B1"'; then
            echo run_legacy=1 >> $GITHUB_OUTPUT
          else
            echo run_legacy=0 >> $GITHUB_OUTPUT
          fi
          cat $GITHUB_OUTPUT

  core_device_test:
    name: Device tests
    needs: param
    runs-on:
      - self-hosted
      - ${{ matrix.model == 'T2B1' && 'hw-t2b1' || matrix.model == 'T3T1' && 'hw-t3t1' || matrix.model == 'T3B1' && 'hw-t3b1' || matrix.model == 'T3W1' && 'hw-t3w1' || 'hw-t2t1' }}
    if: needs.param.outputs.core_models != '[]'
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJSON(needs.param.outputs.core_models) }}
        coins: [universal, btconly]
    env:
      TREZOR_MODEL: ${{ matrix.model }}
      BITCOIN_ONLY: ${{ matrix.coins == 'btconly' && '1' || '0' }}
      PYTEST_TIMEOUT: 600  # 10m single test timeout
      PYOPT: 0
      DISABLE_OPTIGA: 1
      DISABLE_TROPIC: 1
      STORAGE_INSECURE_TESTING_MODE: 1
      BOOTLOADER_DEVEL: ${{ matrix.model == 'T2T1' && '0' || '1' }}
      # TODO: enable SD-related tests after fixing #4924
      # Disable authenticity test since it requires DISABLE_OPTIGA=0
      # Disable Evolu tests since they require Optiga
      # Disable telemetry test, fails because there's no battery
      # 5.5h pytest global timeout
      TESTOPTS: >-
        -m 'not sd_card'
        -k 'not test_authenticate_device and not evolu and not test_telemetry'
        --durations=50
        --session-timeout 19800
      TT_UHUB_PORT: all
    timeout-minutes: 360  # 6h CI job timeout
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: ./.github/actions/environment
      - run: nix-shell --arg hardwareTest true --run uhubctl
      - run: nix-shell --run "uv run make -C core build_firmware"
      - run: nix-shell --arg hardwareTest true --run "uv run python ci/hardware_tests/bootstrap.py \"$TREZOR_MODEL\" core/build-xtask/artifacts/latest/firmware.bin"
      - run: |
          nix-shell --run "uv run trezorctl list"
          nix-shell --run "uv run trezorctl get-features"
        if: matrix.model != 'T3W1'  # gets stuck on models with THP
      - run: |
          nix-shell --arg hardwareTest true --run "./tools/read-device-log.sh /dev/ttyTREZOR &> trezor.log" &
          nix-shell --run "uv run pytest -v --verbose-log-file pytest.log tests/device_tests $TESTOPTS"
      - run: tail -n50 trezor.log || true
        if: failure()
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # actions/upload-artifact@v7.0.0
        with:
          name: core-hardware-${{ matrix.model }}-${{ matrix.coins }}
          path: |
            trezor.log
            pytest.log
          retention-days: 7
        if: always()

  core_monero_test:
    name: Monero tests
    needs: param
    runs-on:
      - self-hosted
      - ${{ matrix.model == 'T2B1' && 'hw-t2b1' || matrix.model == 'T3T1' && 'hw-t3t1' || matrix.model == 'T3B1' && 'hw-t3b1' || matrix.model == 'T3W1' && 'hw-t3w1' || 'hw-t2t1' }}
    if: needs.param.outputs.core_models != '[]' && false  # FIXME https://github.com/trezor/trezor-firmware/issues/3128
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJSON(needs.param.outputs.core_models) }}
    env:
      TREZOR_MODEL: ${{ matrix.model }}
      PYTEST_TIMEOUT: 1200
      PYOPT: 0
      DISABLE_OPTIGA: 1
      DISABLE_TROPIC: 1
      STORAGE_INSECURE_TESTING_MODE: 1
      BOOTLOADER_DEVEL: ${{ matrix.model == 'T2T1' && '0' || '1' }}
      TT_UHUB_PORT: all
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: ./.github/actions/environment
        with:
          full-deps: "true"
      - run: nix-shell --arg hardwareTest true --run uhubctl
      - run: nix-shell --run "uv run make -C core build_firmware"
      - run: nix-shell --arg hardwareTest true --run "uv run python ci/hardware_tests/bootstrap.py \"$TREZOR_MODEL\" core/build-xtask/artifacts/latest/firmware.bin"
      - run: nix-shell --run "uv run trezorctl list"
      - run: nix-shell --run "uv run trezorctl get-features"
      - run: |
          nix-shell --arg hardwareTest true --run "./tools/read-device-log.sh /dev/ttyTREZOR &> trezor.log" &
          nix-shell --arg fullDeps true --run "./core/tests/run_tests_device_emu_monero.sh --trezor-path webusb:"
      - run: tail -n50 trezor.log || true
        if: failure()
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # actions/upload-artifact@v7.0.0
        with:
          name: core-hardware-monero-${{ matrix.model }}
          path: trezor.log
          retention-days: 7
        if: always()

  legacy_device_test:
    name: Device tests T1B1
    needs: param
    runs-on:
      - self-hosted
      - hw-t1b1
    if: needs.param.outputs.run_legacy == '1'
    strategy:
      fail-fast: false
      matrix:
        coins: [universal, btconly]
    env:
      PYTEST_TIMEOUT: 1200
      T1_UHUB_LOCATION: 3-1
      T1_UHUB_PORT: 2
      T1_CAMERA: /dev/video0  # camera device
      T1_ARDUINO_SERIAL: /dev/ttyTPMB  # arduino that pushes T1 buttons
      BITCOIN_ONLY: ${{ matrix.coins == 'universal' && '0' || '1' }}
      DEBUG_LINK: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: ./.github/actions/environment
      - run: nix-shell --arg hardwareTest true --run uhubctl
      - run: nix-shell --run "uv run legacy/script/setup"
      - run: nix-shell --run "export PRODUCTION=0 && uv run legacy/script/cibuild"
      - run: nix-shell --arg hardwareTest true --run "ci/hardware_tests/t1_hw_test.sh"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # actions/upload-artifact@v7.0.0
        with:
          name: legacy-hardware-${{ matrix.coins }}
          path: ci/hardware_tests/*.mp4
          retention-days: 7
        if: always()
