name: Crowdin - push sources (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crowdin-push
  cancel-in-progress: false

jobs:
  crowdin-push-sources:
    name: Split and upload sources
    if: github.ref_name == 'main'  # run only when dispatched from main
    runs-on: ubuntu-latest
    environment: crowdin
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup environment
        uses: ./.github/actions/environment

      - name: Split en.json into per-layout files
        run: nix-shell --run "uv run python core/translations/crowdin.py split"

      - name: Upload sources to Crowdin
        uses: crowdin/github-action@8818ff65bfc4322384f983ea37e3926948c11745  # crowdin/github-action@v2.15.0
        with:
          config: core/translations/crowdin.yml
          upload_sources: true
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
