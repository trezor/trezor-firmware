name: "[Release] emulators for trezor-user-env"

on:
  push:
    tags:
      - 'core/v*'
      - 'legacy/v*'
  workflow_dispatch:
    inputs:
      project:
        type: choice
        required: true
        default: core
        options:
          - core
          - legacy
      version:
        description: version string
        type: string
        required: true
      models_json:
        description: models as a JSON list
        type: string
        required: true
        default: "[\"T2B1\",\"T2T1\",\"T3B1\",\"T3T1\"]"
      tropic_models:
        description: tropic-capable models as a JSON list
        type: string
        required: false
        default: "[\"T3W1\"]"

permissions:
  id-token: write       # for fetching the OIDC token
  contents: read        # for actions/checkout

jobs:
  get_models:
    name: Get models
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.get_models.outputs.models }}
      tropic_models: ${{ steps.get_models.outputs.tropic_models }}
      version: ${{ steps.get_models.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2
      - name: Get models from releases.json
        id: get_models
        run: |
          if [[ $GITHUB_REF == refs/tags/core/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/core/v}
            MODELS=$(jq -cr --arg version "$VERSION" '.firmware[$version]' ./common/releases.json)
          elif [[ $GITHUB_REF == refs/tags/legacy/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/legacy/v}
            MODELS=$(jq -cr --arg version "$VERSION" '.firmware[$version]' ./common/releases.json)
            TROPIC_MODELS='[]'
          else
            VERSION="${{ inputs.version }}"
            MODELS='${{ inputs.models_json }}'
            TROPIC_MODELS='${{ inputs.tropic_models }}'
          fi
          if [[ -z "$TROPIC_MODELS" ]]; then
            TROPIC_MODELS='["T3W1"]'
          fi
          echo "models=$MODELS" >> $GITHUB_OUTPUT
          echo "tropic_models=$TROPIC_MODELS" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT

  core_emu:
    if: startsWith(github.ref, 'refs/tags/core/v') || inputs.project == 'core'
    name: Build emu
    needs: get_models
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.get_models.outputs.models) }}
        coins: [universal]
        type: [debuglink]
        asan: [noasan]
        exclude:
          - type: normal
            asan: asan
    env:
      TREZOR_MODEL: ${{ matrix.model }}
      BITCOIN_ONLY: ${{ matrix.coins == 'universal' && '0' || '1' }}
      PYOPT: ${{ matrix.type == 'debuglink' && '0' || '1' }}
      ADDRESS_SANITIZER: "0"
      LSAN_OPTIONS: "suppressions=../../asan_suppressions.txt"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2
        with:
          submodules: recursive
      - uses: ./.github/actions/build-core-emu
        with:
          model: ${{ matrix.model }}
          version: ${{ needs.get_models.outputs.version }}
          artifact-name: core-emu-${{ matrix.model }}-${{ matrix.coins }}-${{ matrix.type }}-${{ matrix.asan }}
          build-bootloader: ${{ matrix.coins == 'universal' }}

  core_emu_arm:
    if: startsWith(github.ref, 'refs/tags/core/v') || inputs.project == 'core'
    name: Build core emu arm
    needs: get_models
    runs-on: ubuntu-latest-arm64
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.get_models.outputs.models) }}
        coins: [universal]
        type: [debuglink]
        asan: [noasan]
        exclude:
          - type: normal
            asan: asan
    env:
      TREZOR_MODEL: ${{ matrix.model }}
      BITCOIN_ONLY: ${{ matrix.coins == 'universal' && '0' || '1' }}
      PYOPT: ${{ matrix.type == 'debuglink' && '0' || '1' }}
      ADDRESS_SANITIZER: ${{ matrix.asan == 'asan' && '1' || '0' }}
      LSAN_OPTIONS: "suppressions=../../asan_suppressions.txt"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2
        with:
          submodules: recursive
      - uses: ./.github/actions/build-core-emu
        with:
          model: ${{ matrix.model }}
          version: ${{ needs.get_models.outputs.version }}
          artifact-name: core-emu-arm-${{ matrix.model }}-${{ matrix.coins }}-${{ matrix.type }}-${{ matrix.asan }}
          binary-suffix: -arm
          build-bootloader: ${{ matrix.coins == 'universal' }}

  core_emu_tropic_capable:
    if: startsWith(github.ref, 'refs/tags/core/v') || inputs.project == 'core'
    name: Build emu (tropic capable)
    needs: get_models
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.get_models.outputs.tropic_models) }}
        coins: [universal]
        type: [debuglink]
        asan: [noasan]
        exclude:
          - type: normal
            asan: asan
    env:
      TREZOR_MODEL: ${{ matrix.model }}
      BITCOIN_ONLY: ${{ matrix.coins == 'universal' && '0' || '1' }}
      PYOPT: ${{ matrix.type == 'debuglink' && '0' || '1' }}
      ADDRESS_SANITIZER: "0"
      LSAN_OPTIONS: "suppressions=../../asan_suppressions.txt"
      DISABLE_TROPIC: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2
        with:
          submodules: recursive
      - uses: ./.github/actions/build-core-emu
        with:
          model: ${{ matrix.model }}
          version: ${{ needs.get_models.outputs.version }}
          artifact-name: core-emu-tropic-capable-${{ matrix.model }}-${{ matrix.coins }}-${{ matrix.type }}-${{ matrix.asan }}
          s3-subpath: ${{ matrix.model}}_tropic_on/
          build-bootloader: ${{ matrix.coins == 'universal' }}

  core_emu_arm_tropic_capable:
    if: startsWith(github.ref, 'refs/tags/core/v') || inputs.project == 'core'
    name: Build core emu arm (tropic capable)
    needs: get_models
    runs-on: ubuntu-latest-arm64
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.get_models.outputs.tropic_models) }}
        coins: [universal]
        type: [debuglink]
        asan: [noasan]
        exclude:
          - type: normal
            asan: asan
    env:
      TREZOR_MODEL: ${{ matrix.model }}
      BITCOIN_ONLY: ${{ matrix.coins == 'universal' && '0' || '1' }}
      PYOPT: ${{ matrix.type == 'debuglink' && '0' || '1' }}
      ADDRESS_SANITIZER: ${{ matrix.asan == 'asan' && '1' || '0' }}
      LSAN_OPTIONS: "suppressions=../../asan_suppressions.txt"
      DISABLE_TROPIC: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2
        with:
          submodules: recursive
      - uses: ./.github/actions/build-core-emu
        with:
          model: ${{ matrix.model }}
          version: ${{ needs.get_models.outputs.version }}
          artifact-name: core-emu-arm-tropic-capable-${{ matrix.model }}-${{ matrix.coins }}-${{ matrix.type }}-${{ matrix.asan }}
          binary-suffix: -arm
          s3-subpath: ${{ matrix.model}}_tropic_on/
          build-bootloader: ${{ matrix.coins == 'universal' }}

  legacy_emu:
    if: startsWith(github.ref, 'refs/tags/legacy/v') || inputs.project == 'legacy'
    name: Build legacy emu
    needs: get_models
    runs-on: ubuntu-latest
    strategy:
      matrix:
        coins: [universal]
        type: [debuglink]
        arch: [x86_64]
        asan: [noasan]
    env:
      EMULATOR: 1
      BITCOIN_ONLY: ${{ matrix.coins == 'universal' && '0' || '1' }}
      DEBUG_LINK: ${{ matrix.type == 'debuglink' && '1' || '0' }}
      ADDRESS_SANITIZER: ${{ matrix.asan == 'asan' && '1' || '0' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2
        with:
          submodules: recursive
      - uses: ./.github/actions/build-legacy-emu
        with:
          version: ${{ needs.get_models.outputs.version }}


  legacy_emu_arm:
    if: startsWith(github.ref, 'refs/tags/legacy/v') || inputs.project == 'legacy'
    name: Build legacy emu arm
    needs: get_models
    runs-on: ubuntu-latest-arm64
    strategy:
      matrix:
        coins: [universal]
        type: [debuglink]
        asan: [noasan]
    env:
      EMULATOR: 1
      BITCOIN_ONLY: ${{ matrix.coins == 'universal' && '0' || '1' }}
      DEBUG_LINK: ${{ matrix.type == 'debuglink' && '1' || '0' }}
      ADDRESS_SANITIZER: ${{ matrix.asan == 'asan' && '1' || '0' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2
        with:
          submodules: recursive
      - uses: ./.github/actions/build-legacy-emu
        with:
          version: ${{ needs.get_models.outputs.version }}
          binary-suffix: -arm
