[package]
name = "upymod"
version = "0.0.0"
edition = "2024"
links = "upymod"

[build-dependencies]
color-eyre.workspace = true
xbuild.workspace = true

[dependencies]
models.workspace = true
rtl.workspace = true
sec.workspace = true
io.workspace = true

[features]

# --------------------------------------------------------------------------
# MCU features
# --------------------------------------------------------------------------

mcu_stm32f427 = ["io/mcu_stm32f427", "mcu_stm32f4"]
mcu_stm32f429 = ["io/mcu_stm32f429", "mcu_stm32f4"]
mcu_stm32u58 = ["io/mcu_stm32u58", "mcu_stm32u5"]
mcu_stm32u5g = ["io/mcu_stm32u5g", "mcu_stm32u5"]

# --------------------------------------------------------------------------
# Selectable components
# --------------------------------------------------------------------------

app_loading = ["io/app_loading", "io/ipc"]
backlight = ["io/backlight"]
benchmark = []
ble = ["io/ble"]
button = ["io/button"]
disable_animation = []
enable_source_lines = []
emulator = ["io/emulator"]
frozen = []
haptic = ["io/haptic"]
layout_bolt = []
layout_caesar = []
layout_delizia = []
layout_eckhart = []
log_stack_usage = []
mcu_attestation = ["sec/mcu_attestation"]
memperf = []
n4w1 = []
optiga = ["sec/optiga"]
power_manager = ["io/power_manager"]
pyopt = []
rgb_led = ["io/rgb_led"]
serial_number = []
sd_card = ["io/sd_card"]
telemetry = ["sec/telemetry"]
thp = []
touch = ["io/touch"]
tropic = ["sec/tropic"]
universal_fw = ["rtl/universal_fw"]

# Legacy coin support
decred = []
eos = []
nem = []

# --------------------------------------------------------------------------
# Automatically derived features (do not enable from outside)
# --------------------------------------------------------------------------

default = ["sec/storage"]

mcu_stm32f4 = ["mcu_stm32"]
mcu_stm32u5 = ["mcu_stm32"]
mcu_stm32 = []
