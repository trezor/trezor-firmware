uses = [
    "backup_ram",
    "boot_ucb",
    "consumption_mask",
    "hash_processor",
    "lockable_bootloader",
    "mcu_attestation",
    "nrf_auth",
    "optiga",
    "pq_secure_boot",
    "secret",
    "secure_aes",
    "suspend",
    "tamper",
    "telemetry",
    "tropic",
]

# ".header" is the TRZM module header in the Merkle-tree layout; ".secmon_header"
# is the legacy TSEC header. Only one is present per build (the other is a no-op).
elf_sections = [".secmon_header", ".header", ".flash", ".data", ".gnu.sgstubs"]
