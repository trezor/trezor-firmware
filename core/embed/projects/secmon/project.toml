uses = [
    "backup_ram",
    "boot_ucb",
    "consumption_mask",
    "hash_processor",
    "lockable_bootloader",
    "mcu_attestation",
    "nrf_auth",
    "optiga",
    "pq_secure_boot",
    "secret",
    "secure_aes",
    "suspend",
    "tamper",
    "telemetry",
    "tropic",
]

# ".secmon_header" is the legacy TSEC header; ".header" is the legacy image
# header. Both are absent (no-ops) in the Merkle-tree layout, where the secmon is
# just code committed directly by the firmware manifest.
elf_sections = [".secmon_header", ".header", ".flash", ".data", ".gnu.sgstubs"]
