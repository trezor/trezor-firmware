[package]
name = "secmon"
version = "0.0.0"
edition = "2024"
links = "secmon"

[build-dependencies]
cbuild = { path = "../../cbuild" }

[dependencies]
sys = { path = "../../sys" }
sec = { path = "../../sec" }
models = { path = "../../models" }

[features]

# --------------------------------------------------------------------------
# Model features
# --------------------------------------------------------------------------

model_d002 = []

model_t3b1 = [
    "sec/model_t3b1",
    "consumption_mask",
    "hash_processor",
    "optiga",
    "secret",
    "secure_aes",
    "tamper",
    ]

model_t3t1 = [
    "sec/model_t3t1",
    "hash_processor",
    "optiga",
    "secret",
    "secure_aes",
    "tamper",
    ]

model_t3w1 = [
    "sec/model_t3w1",
    "backup_ram",
    "boot_ucb",
    "hash_processor",
    "optiga",
    "secret",
    "secure_aes",
    "suspend",
    "tamper",
    "telemetry",
    ]

# --------------------------------------------------------------------------
# MCU features
# --------------------------------------------------------------------------

mcu_stm32f4 = ["sec/mcu_stm32f4"]
mcu_stm32u58 = ["sec/mcu_stm32u58", "mcu_stm32u5"]
mcu_stm32u5g = ["sec/mcu_stm32u5g", "mcu_stm32u5"]
mcu_emulator = ["sec/mcu_emulator"]

# --------------------------------------------------------------------------
# Automatically derived features (do not enable from outside)
# --------------------------------------------------------------------------

default = [
    "models/secmon-layout",
    "models/secmon",
    "sec/kernel_mode",
    "sec/secure_mode",
    "sec/storage",
    ]

mcu_stm32u5 = ["sys/trustzone"]

backup_ram = ["sec/backup_ram"]
boot_ucb = ["sec/boot_ucb"]
consumption_mask = ["sec/consumption_mask"]
hash_processor = ["sec/hash_processor"]
optiga = ["sec/optiga"]
secret = ["sec/secret"]
secure_aes = ["sec/secure_aes"]
tamper = ["sec/tamper"]
telemetry = ["sec/telemetry"]
suspend = ["sec/suspend"]
