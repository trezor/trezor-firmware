[package]
name = "boardloader"
version = "0.0.0"
edition = "2024"
links = "boardloader"

[[bin]]
name = "boardloader"
path = "src/main.rs"
test = false
bench = false

[build-dependencies]
color-eyre.workspace = true
xbuild.workspace = true


[dependencies]
io.workspace = true
sec.workspace = true
sys.workspace = true
crypto.workspace = true
rtl.workspace = true
models.workspace = true

[features]

# --------------------------------------------------------------------------
# Model features
# --------------------------------------------------------------------------

model_d001 = [
    "io/model_d001",
    "mcu_stm32f429",
    "dma2d",
    "pvd",
    "sdram",
    ]

model_d002 = [
    "io/model_d002",
    "mcu_stm32u5g",
    "backlight",
    "boot_ucb",
    "dma2d",
    "hash_processor",
    "lockable_bootloader",
    "secret",
    "secure_aes",
    "tamper",
    ]

model_t2t1 = [
    "io/model_t2t1",
    "mcu_stm32f427",
    "backlight",
    "pvd",
    "sd_card_update",
    ]

model_t2b1 = [
    "io/model_t2b1",
    "mcu_stm32f427",
    "pvd",
    "secret",
    ]

model_t3b1 = [
    "io/model_t3b1",
    "mcu_stm32u58",
    "hash_processor",
    "lockable_bootloader",
    "pvd",
    "secret",
    "secure_aes",
    "tamper",
    ]

model_t3t1 = [
    "io/model_t3t1",
    "mcu_stm32u58",
    "backlight",
    "hash_processor",
    "lockable_bootloader",
    "pvd",
    "sd_card_update",
    "secret",
    "secure_aes",
    "tamper",
    ]

model_t3w1 = [
    "io/model_t3w1",
    "mcu_stm32u5g",
    "backlight",
    "boot_ucb",
    "dma2d",
    "hash_processor",
    "lockable_bootloader",
    "pmic",
    "secret",
    "secure_aes",
    "tamper",
    ]

# --------------------------------------------------------------------------
# Selectable features
# --------------------------------------------------------------------------

bootloader_devel = ["sec/bootloader_devel"]
clippy = []
emulator = ["io/emulator"]
dbg_console_swo = ["dbg_console"]
dbg_console_system_view = ["dbg_console", "sys/system_view"]
production = ["io/production"]

# --------------------------------------------------------------------------
# Automatically derived features (do not enable from outside)
# --------------------------------------------------------------------------

default = [
    "io/display",
    "io/kernel_mode",
    "io/secure_mode",
    "models/boardloader",
    "crypto/ed25519_no_precomp",
    "crypto/with_new_crates", # only for transitional period
    ]

mcu_stm32f427 = ["io/mcu_stm32f427", "mcu_stm32f4"]
mcu_stm32f429 = ["io/mcu_stm32f429", "mcu_stm32f4"]
mcu_stm32f4 = []
mcu_stm32u58 = ["io/mcu_stm32u58", "mcu_stm32u5"]
mcu_stm32u5g = ["io/mcu_stm32u5g", "mcu_stm32u5"]
mcu_stm32u5 = ["sec/trustzone"]

backlight = ["io/backlight"]
boot_ucb = ["sec/boot_ucb"]
dbg_console = ["sys/dbg_console"]
dma2d = ["io/dma2d"]
hash_processor = ["sec/hash_processor"]
lockable_bootloader = ["io/lockable_bootloader"]
pmic = ["io/pmic"]
pvd = ["sys/pvd"]
sd_card_update = ["io/sd_card"]
sdram = ["sys/sdram"]
secret = ["sec/secret"]
secure_aes = ["sec/secure_aes"]
tamper = ["sec/tamper"]

