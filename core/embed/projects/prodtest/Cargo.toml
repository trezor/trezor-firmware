[package]
name = "prodtest"
version = "0.0.0"
edition = "2024"
links = "prodtest"

[build-dependencies]
cbuild = { path = "../../cbuild" }

[dependencies]
trezor_lib = { path = "../../rust" }
io = { path = "../../io" }
sec = { path = "../../sec" }
sys = { path = "../../sys" }
models = { path = "../../models" }

[features]

# --------------------------------------------------------------------------
# Model features
# --------------------------------------------------------------------------

model_d001 = []
model_d002 = []


#TODO !@# ble, rtc, pvd

model_t2t1 = [
    "io/model_t2t1",
    "backlight",
    "touch",
]

model_t2b1 = [
    "io/model_t2b1",
    "button",
    "consumption_mask",
    "lockable_bootloader",
    "secret",
]

model_t3b1 = [
    "io/model_t3b1",
    "button",
    "consumption_mask",
    "hash_processor",
    "lockable_bootloader",
    "secret",
    "secure_aes",
    "tamper",
]

model_t3t1 = [
    "io/model_t3t1",
    "backlight",
    "haptic",
    "hash_processor",
    "lockable_bootloader",
    "secret",
    "secure_aes",
    "tamper",
    "touch",
]

model_t3w1 = [
    "io/model_t3w1",
    "backlight",
    "backup_ram",
    "boot_ucb",
    "button",
    "haptic",
    "hash_processor",
    "iwdg",
    "lockable_bootloader",
    "power_manager",
    "secret",
    "suspend",
    "tamper",
    "telemetry",
    "touch",
]

# --------------------------------------------------------------------------
# MCU features
# --------------------------------------------------------------------------

mcu_stm32f4 = ["io/mcu_stm32f4"]
mcu_stm32u58 = ["io/mcu_stm32u58", "mcu_stm32u5"]
mcu_stm32u5g = ["io/mcu_stm32u5g", "mcu_stm32u5"]
mcu_emulator = ["io/mcu_emulator"]

