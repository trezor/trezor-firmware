# ".manifest" is the firmware manifest region at the image start in the
# Merkle-tree layout (absent, thus a no-op, on legacy builds); ".vendorheader"
# is legacy-only. ".header" is the TRZM module header (tree) or the image header
# (legacy) -- only one is present per build.
elf_sections = [".manifest", ".vendorheader", ".header", ".flash", ".data"]

secmon_body_sections   = [".secmon_header", ".flash", ".data"]
secmon_header_sections = [".vendorheader", ".header"]
