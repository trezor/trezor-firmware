[package]
name = "trezor-crypto"
version = "0.1.0"
edition = "2024"

[features]
test = []

[dependencies]
cty = "0.2.2"
heapless = { version = "0.9.2", default-features = false }
zeroize = { version = "1.8.2", default-features = false, features = ["derive"] }

[build-dependencies]
bindgen = { version = "0.72.1", default-features = false }
cc = "1.2.61"
glob = "0.3.3"

[dev-dependencies]
hex = "0.4.3"
rand = { version = "0.10.1", default-features = false }
trezor-crypto = { path = ".", features = ["test"] }
