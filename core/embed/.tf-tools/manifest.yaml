models:
  - id: t3w1
    name: T3W1
    artifactFolder: T3W1
  - id: t3t1
    name: T3T1
    artifactFolder: T3T1
  - id: t3b1
    name: T3B1
    artifactFolder: T3B1
  - id: t2b1
    name: T2B1
    artifactFolder: T2B1
  - id: t2t1
    name: T2T1
    artifactFolder: T2T1
  - id: d001
    name: D001
    artifactFolder: D001
  - id: d002
    name: D002
    artifactFolder: D002

targets:
  - id: hardware
    name: Hardware
    shortName: HW
    flag: null
    executableExtension: .elf
  - id: emulator
    name: Emulator
    shortName: EMU
    flag: --emulator
    artifactSuffix: -emu

components:
  - id: firmware
    name: Firmware
    artifactName: firmware
    uploadWhen: target(hardware)
    debug:
      - name: Emu - Firmware
        when: target(emulator)
        template: emu-firmware.json
      - name: F4 - Firmware (Kernel)
        when: all(target(hardware), any(model(t2b1), model(t2t1), model(d001)))
        template: f4-kernel+coreapp.json
      - name: U5 - Firmware (Kernel)
        when: all(target(hardware), any(model(t3b1), model(t3t1), model(t3w1), model(d002)))
        template: u5-kernel+coreapp.json
      - name: U5 - Firmware  (Secmon)
        when: all(target(hardware), any(model(t3w1), model(d002)))
        template: u5-secmon+kernel+coreapp.json

  - id: prodtest
    name: ProdTest
    artifactName: prodtest
    uploadWhen: target(hardware)
    debug:
      - name: Emu - Prodtest
        when: target(emulator)
        template: emu-generic.json
      - name: F4 - Prodtest
        when: all(target(hardware), any(model(t2b1), model(t2t1), model(d001)))
        template: f4-generic.json
      - name: U5 - Prodtest
        when: all(target(hardware), any(model(t3b1), model(t3t1), model(t3w1), model(d002)))
        template: u5-generic.json

  - id: bootloader
    name: Bootloader
    artifactName: bootloader
    flashWhen: target(hardware)
    debug:
      - name: Emu - Bootloader
        when: target(emulator)
        template: emu-generic.json
      - name: F4 - Bootloader
        when: all(target(hardware), any(model(t2b1), model(t2t1), model(d001)))
        template: f4-generic.json
      - name: U5 - Bootloader
        when: all(target(hardware), any(model(t3b1), model(t3t1), model(t3w1), model(d002)))
        template: u5-generic.json

  - id: bootloader_ci
    name: Bootloader CI
    artifactName: bootloader_ci
    flashWhen: target(hardware)
    debug:
      - name: Emu - Bootloader CI
        when: target(emulator)
        template: emu-generic.json
      - name: F4 - Bootloader CI
        when: all(target(hardware), any(model(t2b1), model(t2t1), model(d001)))
        template: f4-generic.json
      - name: U5 - Bootloader CI
        when: all(target(hardware), any(model(t3b1), model(t3t1), model(t3w1), model(d002)))
        template: u5-generic.json

  - id: boardloader
    name: Boardloader
    artifactName: boardloader
    flashWhen: target(hardware)
    debug:
      - name: Emu - Boardloader
        when: target(emulator)
        template: emu-generic.json
      - name: F4 - Boardloader
        when: all(target(hardware), any(model(t2b1), model(t2t1), model(d001)))
        template: f4-generic.json
      - name: U5 - Boardloader
        when: all(target(hardware), any(model(t3b1), model(t3t1), model(t3w1), model(d002)))
        template: u5-generic.json

options:
  - id: debug
    name: Debug Optimization
    description: Controls debug symbol generation.
    group: Debugging
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the toolchain default.
        default: true
      - value: "true"
        name: Enabled
        description: Force debug symbols on.
      - value: "false"
        name: Disabled
        description: Strip debug symbols.

  - id: dbg-console
    name: Debug Console
    description: Selects the debug console backend.
    group: Debugging
    when: target(hardware)
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the component default.
        default: true
      - value: vcp
        name: VCP
        description: Route the debug console over virtual COM port.
      - value: swo
        name: SWO
        description: Route the debug console over SWO.
      - value: system-view
        name: SystemView
        description: Route the debug console over SEGGER SystemView.

  - id: frozen
    name: Frozen Modules
    description: Controls embedding frozen MicroPython modules.
    group: Debugging
    when: component(firmware)
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the component and target default.
        default: true
      - value: "true"
        name: Enabled
        description: Embed frozen MicroPython modules.
      - value: "false"
        name: Disabled
        description: Do not embed frozen MicroPython modules.

  - id: pyopt
    name: MicroPython Optimization
    description: Controls MicroPython bytecode optimization.
    group: Debugging
    when: component(firmware)
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the target default.
        default: true
      - value: "true"
        name: Enabled
        description: Optimize MicroPython bytecode.
      - value: "false"
        name: Disabled
        description: Disable MicroPython bytecode optimization.

  - id: source-lines
    name: Embed Source Lines
    description: Controls inclusion of MicroPython source lines.
    group: Debugging
    when: component(firmware)
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the target default.
        default: true
      - value: "true"
        name: Enabled
        description: Include MicroPython source lines.
      - value: "false"
        name: Disabled
        description: Exclude MicroPython source lines.

  - id: perf-overlay
    name: Performance Overlay
    description: Shows the UI performance overlay.
    group: Debugging
    when: not(any(component(boardloader), component(bootloader_ci)))
    type: checkbox

  - id: benchmark
    name: Benchmark
    description: Includes crypto benchmarks.
    group: Debugging
    when: component(firmware)
    type: checkbox

  - id: log-stack-usage
    name: Log Stack Usage
    description: Logs stack usage.
    when: component(firmware)
    group: Debugging
    type: checkbox

  - id: block-on-vcp
    name: Blocking USB VCP
    description: Uses blocking writes on VCP.
    when: not(component(boardloader))
    group: Debugging
    type: checkbox

  - id: debug-link
    name: Debug Link
    description: Controls debug link support.
    group: Testing
    when: any(component(firmware), component(bootloader))
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the target default.
        default: true
      - value: "true"
        name: Enabled
        description: Enable debug link support.
      - value: "false"
        name: Disabled
        description: Disable debug link support.

  - id: n4w1
    name: N4W1 Support
    description: Enables N4W1 support.
    group: Testing
    when: component(firmware)
    type: checkbox

  - id: disable-animation
    name: Disable Animation
    description: Disables UI animations.
    group: Testing
    when: any(component(firmware), component(bootloader))
    type: checkbox

  - id: disable-optiga
    name: Disable OPTIGA
    description: Disables OPTIGA support.
    when: component(firmware)
    group: Testing
    type: checkbox

  - id: disable-tropic
    name: Disable TROPIC
    description: Controls whether TROPIC support is disabled.
    when: component(firmware)
    group: Testing
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the target default.
        default: true
      - value: "true"
        name: Enabled
        description: Disable TROPIC support.
      - value: "false"
        name: Disabled
        description: Keep TROPIC support enabled.

  - id: storage-insecure-testing-mode
    name: Insecure Storage Testing
    description: Enables insecure storage test mode.
    group: Testing
    when: all(component(firmware), not(target(emulator)))
    type: checkbox

  - id: production
    name: Production
    description: Builds a production-signed firmware image.
    type: checkbox
    group: Signing

  - id: bootloader-qa
    name: QA Bootloader
    description: Uses the QA bootloader.
    when: all(target(hardware), component(firmware))
    type: checkbox
    group: Signing

  - id: bootloader-devel
    name: Dev Bootloader
    description: Uses the development bootloader.
    when: all(target(hardware), any(component(firmware), component(prodtest)))
    type: checkbox
    group: Signing

  - id: unsafe-fw
    name: Unsafe Firmware
    description: Enables unsafe firmware features.
    when: all(target(hardware), component(firmware))
    type: checkbox
    group: Signing

  - id: btc-only
    name: Bitcoin Only Firmware
    description: Toggles Bitcoin-only firmware mode.
    when: component(firmware)
    type: checkbox

  - id: apps
    name: External Apps Support
    description: Enables external app loading.
    when: component(firmware)
    type: checkbox

  - id: timings
    name: Generate Cargo Timings
    description: Outputs Cargo timings.
    type: checkbox
