[package]
name = "sys"
version = "0.0.0"
edition = "2024"
links = "sys"

[build-dependencies]
color-eyre.workspace = true
xbuild.workspace = true

[dependencies]
rtl.workspace = true
models.workspace = true

[features]

# --------------------------------------------------------------------------
# MCU features
# --------------------------------------------------------------------------

mcu_stm32f427 = ["models/mcu_stm32f427", "mcu_stm32f4"]
mcu_stm32f429 = ["models/mcu_stm32f429", "mcu_stm32f4"]
mcu_stm32u58 = ["models/mcu_stm32u58", "mcu_stm32u5"]
mcu_stm32u5g = ["models/mcu_stm32u5g", "mcu_stm32u5"]

# --------------------------------------------------------------------------
# Privilege mode features
# --------------------------------------------------------------------------

kernel_mode = ["models/kernel_mode"]
secure_mode = ["models/secure_mode"]

# --------------------------------------------------------------------------
# Selectable components
# --------------------------------------------------------------------------

applets = []
app_loading = ["applets"]
block_on_vcp = []
boot_ucb = []
emulator = ["models/emulator", "rtl/emulator"]
i2c_bus = []
ipc = []
lockable_bootloader = []
pvd = []
rtc = []
trustzone = []
dbg_console = []
dbg_console_swo = ["dbg_console"]
dbg_console_vcp = ["dbg_console"]
dbg_console_system_view = ["dbg_console", "system_view"]
sdram = []
sdram_stm32f429i_disc1 = []
storage_hw_key = []
system_view = []
production = ["rtl/production"]

# --------------------------------------------------------------------------
# Automatically derived features (do not enable from outside)
# --------------------------------------------------------------------------

mcu_stm32f4 = ["mcu_stm32"]
mcu_stm32u5 = ["mcu_stm32"]
mcu_stm32 = []

