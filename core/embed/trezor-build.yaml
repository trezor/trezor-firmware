models:
  - id: t3w1
    name: T3W1
    artifact: T3W1
  - id: t3t1
    name: T3T1
    artifact: T3T1
  - id: t3b1
    name: T3B1
    artifact: T3B1
  - id: t2b1
    name: T2B1
    artifact: T2B1
  - id: t2t1
    name: T2T1
    artifact: T2T1
  - id: d001
    name: D001
    artifact: D001
  - id: d002
    name: D002
    artifact: D002

targets:
  - id: hardware
    name: Hardware
    flag: null
  - id: emulator
    name: Emulator
    flag: --emulator

components:
  - id: firmware
    name: Firmware
  - id: prodtest
    name: ProdTest
  - id: bootloader
    name: Bootloader
  - id: bootloader-ci
    name: Bootloader CI
  - id: boardloader
    name: Boardloader

options:
  - id: debug
    name: Debug Optimization
    description: Controls debug symbol generation.
    group: Debugging
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the toolchain default.
        default: true
      - value: "true"
        name: Enabled
        description: Force debug symbols on.
      - value: "false"
        name: Disabled
        description: Strip debug symbols.

  - id: dbg-console
    name: Debug Console
    description: Selects the debug console backend.
    group: Debugging
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the component default.
        default: true
      - value: vcp
        name: VCP
        description: Route the debug console over virtual COM port.
      - value: swo
        name: SWO
        description: Route the debug console over SWO.
      - value: system-view
        name: SystemView
        description: Route the debug console over SEGGER SystemView.

  - id: frozen
    name: Frozen Modules
    description: Controls embedding frozen MicroPython modules.
    group: Debugging
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the component and target default.
        default: true
      - value: "true"
        name: Enabled
        description: Embed frozen MicroPython modules.
      - value: "false"
        name: Disabled
        description: Do not embed frozen MicroPython modules.

  - id: pyopt
    name: MicroPython Optimization
    description: Controls MicroPython bytecode optimization.
    group: Debugging
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the target default.
        default: true
      - value: "true"
        name: Enabled
        description: Optimize MicroPython bytecode.
      - value: "false"
        name: Disabled
        description: Disable MicroPython bytecode optimization.

  - id: source-lines
    name: Embed Source Lines
    description: Controls inclusion of MicroPython source lines.
    group: Debugging
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the target default.
        default: true
      - value: "true"
        name: Enabled
        description: Include MicroPython source lines.
      - value: "false"
        name: Disabled
        description: Exclude MicroPython source lines.

  - id: perf-overlay
    name: Performance Overlay
    description: Shows the UI performance overlay.
    group: Debugging
    type: checkbox

  - id: benchmark
    name: Benchmark
    description: Includes crypto benchmarks.
    group: Debugging
    type: checkbox

  - id: log-stack-usage
    name: Log Stack Usage
    description: Logs stack usage.
    group: Debugging
    type: checkbox

  - id: block-on-vcp
    name: Blocking USB VCP
    description: Uses blocking writes on VCP.
    group: Debugging
    type: checkbox

  - id: debug-link
    name: Debug Link
    description: Controls debug link support.
    group: Testing
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the target default.
        default: true
      - value: "true"
        name: Enabled
        description: Enable debug link support.
      - value: "false"
        name: Disabled
        description: Disable debug link support.

  - id: disable-animation
    name: Disable Animation
    description: Disables UI animations.
    group: Testing
    type: checkbox

  - id: disable-optiga
    name: Disable OPTIGA
    description: Disables OPTIGA support.
    group: Testing
    type: checkbox

  - id: disable-tropic
    name: Disale TROPIC
    description: Controls whether TROPIC support is disabled.
    group: Testing
    type: multistate
    states:
      - value: null
        name: Default
        description: Use the target default.
        default: true
      - value: "true"
        name: Enabled
        description: Disable TROPIC support.
      - value: "false"
        name: Disabled
        description: Keep TROPIC support enabled.

  - id: storage-insecure-testing-mode
    name: Insecure Storage Testing
    description: Enables insecure storage test mode.
    group: Testing
    type: checkbox

  - id: production
    name: Production
    description: Builds a production-signed firmware image.
    type: checkbox
    group: Vendor Headers

  - id: bootloader-qa
    name: QA Bootloader
    description: Uses the QA bootloader.
    type: checkbox
    group: Vendor Headers

  - id: bootloader-devel
    name: Dev Bootloader
    description: Uses the development bootloader.
    type: checkbox
    group: Vendor Headers

  - id: unsafe-fw
    name: Unsafe Firmware
    description: Enables unsafe firmware features.
    type: checkbox
    group: Vendor Headers

  - id: btc-only
    name: Bitcoin Only Firmware
    description: Toggles Bitcoin-only firmware mode.
    type: checkbox

  - id: apps
    name: External Apps Support
    description: Enables external app loading.
    type: checkbox

  - id: timings
    name: Generate Cargo Timings
    description: Outputs Cargo timings.
    type: checkbox
