mcu = "stm32u5g"
default_board = "revC"
secmon = true
bootloader_header_tool = "headertool_pq"

features = [
    "backup_ram",
    "boot_ucb",
    "dma2d",
    "hash_processor",
    "hw_jpeg_decoder",
    "hw_revision",
    "iwdg",
    "lockable_bootloader",
    "mcu_attestation",
    "rtc",
    "secmon_header",
    "secmon_layout",
    "secmon_verification",
    "secret",
    "secure_aes",
    "serial_number",
    "smp",
    "framebuffer",
    "suspend",
    "tamper",
    "telemetry",
    "thp",
    "touch_wakeup",
    "layout_eckhart",
]
