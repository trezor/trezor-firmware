mcu = "stm32u58"
default_board = "revE"

features = [
    "dma2d",
    "hash_processor",
    "hw_revision",
    "lockable_bootloader",
    "pvd",
    "secret",
    "secure_aes",
    "secure_mode",
    "tamper",
    "framebuffer",
    "layout_delizia",
    "display_rgb565",
]

[project_overrides.bootloader]
exclude = ["haptic"]

# Firmware and kernel run the display without a framebuffer (direct-to-panel
# rendering) to save SRAM. The flash-constrained bootloader/boardloader/prodtest
# keep the framebuffer, where RAM is not the limiting factor.
[project_overrides.firmware]
exclude = ["framebuffer"]

[project_overrides.kernel]
exclude = ["framebuffer"]
