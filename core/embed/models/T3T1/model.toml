mcu = "stm32u58"
default_board = "revE"

features = [
    "dma2d",
    "hash_processor",
    "hw_revision",
    "lockable_bootloader",
    "pvd",
    "secret",
    "secure_aes",
    "framebuffer",
    "secure_mode",
    "tamper",
    "layout_delizia",
    "display_rgb565",
]

[project_overrides.bootloader]
exclude = ["haptic"]
