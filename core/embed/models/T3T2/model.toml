mcu = "stm32u58"
default_board = "devkit"
secmon = true
bootloader_header_tool = "headertool_pq"

features = [
    "backup_ram",
    "boot_ucb",
    "dma2d",
    "hash_processor",
    "hw_revision",
    "iwdg",
    "lockable_bootloader",
    "mcu_attestation",
    "secmon_header",
    "secmon_layout",
    "secmon_verification",
    "secret",
    "secure_aes",
    "serial_number",
    "smp",
    "framebuffer",
    "tamper",
    "thp",
    "layout_delizia",
    "display_rgb565",
]

