syntax = "proto2";
package hw.trezor.messages.bootloader;

// Sugar for easier handling in Java
option java_outer_classname = "TrezorMessageBootloader";
option java_package = "com.satoshilabs.trezor.lib.protobuf";

/**
 * Request: Ask device to erase its firmware (so it can be replaced via FirmwareUpload)
 * @start
 * @next FirmwareRequest
 */
message FirmwareErase {
    optional uint32 length = 1;  // length of new firmware
}

/**
 * Request: Begin a firmware update (phase 1). Carries the new signed boot header
 * and the new firmware's manifest + Merkle proof. The device authenticates them,
 * confirms with the user, decides keep-seed, stages the boot header (with the
 * resolved firmware_type) via the UCB and reboots; the firmware modules are
 * installed by the freshly-booted bootloader (phase 2). If the bootloader code
 * is unchanged this is a header-only update (no code streamed).
 * @start
 * @next FirmwareRequest
 */
message FirmwareBegin {
    required bytes boot_header = 1;      // new signed boot header (TRZQ)
    required bytes module_headers = 2;   // authenticated firmware manifest (TRZD variant leaf) + per-variant Merkle proof; device folds it to firmware_root
    optional uint32 code_length = 3;     // new bootloader code available to stream; omit/0 => header-only
    // (tag 4 was custom_install; removed -- custom is now the authenticated
    // FW_VARIANT_CUSTOM manifest variant, derived on-device, no host flag)
    reserved 4;
}

/**
 * Response: Ask for firmware chunk
 * @next FirmwareUpload
 */
message FirmwareRequest {
    required uint32 offset = 1;  // offset of requested firmware chunk
    required uint32 length = 2;  // length of requested firmware chunk
}

/**
 * Request: Send firmware in binary form to the device
 * @next FirmwareRequest
 * @next Success
 * @next Failure
 */
message FirmwareUpload {
    required bytes payload = 1;  // firmware to be loaded into device
    optional bytes hash = 2;     // hash of the payload
}

/**
 * Request: Perform a prodtest on T1
 * @next Success
 * @next Failure
 */
message ProdTestT1 {
    optional bytes payload = 1;  // payload to be used in prodtest
}
