syntax = "proto2";
package hw.trezor.messages.authdb;

// Sugar for easier handling in Java
option java_package = "com.satoshilabs.trezor.lib.protobuf";
option java_outer_classname = "TrezorMessageAuthDb";

/**
 * Request: Set (or replace) the Merkle root stored on the device and increment the counter.
 * DEBUG ONLY: on production firmware this is rejected.  Production firmware must derive the
 * root itself via AuthDbUpdateLeaf.  Accepting an external root would allow an attacker to
 * forge the entire database state.
 * @start
 * @next AuthDbSetRootResponse
 * @next Failure
 */
message AuthDbSetRoot {
    required bytes root      = 1;  // 32-byte Merkle root
    optional bytes mac       = 2;  // HMAC-SHA256(slip21_key, root) — skips confirmation if valid
    optional bytes device_id = 3;  // identifier matching the MAC key owner
}

/**
 * Response: Confirmation that the root was stored.
 * @end
 */
message AuthDbSetRootResponse {
    required uint32 counter    = 1;  // monotonic counter after this operation
    optional bytes  wallet_id  = 2;  // SLIP21(seed-without-passphrase, "AUTHDB DEVICE ID"), scopes the tree
}

/**
 * Request: Verify a Merkle Patricia Trie proof for a (address, value) pair.
 *
 * Membership proof (witness_address absent):
 *   Verify that (address, value) is in the tree with the stored root.
 *
 * Non-membership proof (witness_address present):
 *   Verify that address is NOT in the tree by proving a witness leaf (witness_address,
 *   witness_value) that occupies address's path.  The device checks:
 *     1. witness is in the tree (membership proof for witness against stored root)
 *     2. witness_address != address
 *     3. witness_address and address share all bit-positions that appear in proof
 *   If the proof list is empty and witness_address is absent, the tree is empty.
 *
 * @start
 * @next AuthDbLookupResponse
 * @next Failure
 */
message AuthDbLookup {
    required bytes address         = 1;  // key whose SHA-256 determines the tree path
    optional bytes value           = 2;  // value stored at address (required for membership)
    repeated bytes proof           = 3;  // sibling hashes, leaf-to-root order (33 bytes each)
    optional bytes witness_address = 4;  // non-membership: witness leaf address
    optional bytes witness_value   = 5;  // non-membership: witness leaf value
}

/**
 * Response: Verification result together with the current counter.
 * @end
 */
message AuthDbLookupResponse {
    required bool   valid      = 1;  // true if proof is valid against stored root
    required uint32 counter    = 2;  // current monotonic counter
    optional bool   membership = 3;  // true = membership proof, false = non-membership
    optional bytes  wallet_id  = 4;  // SLIP21(seed-without-passphrase, "AUTHDB DEVICE ID"), scopes the tree
}

/**
 * Request: Atomically update a leaf in the Merkle tree.
 *
 * The device verifies old_value is the current value at address (or the address is absent
 * when old_value is empty), then computes and stores the new root.
 *
 * Supported operations:
 *   UPDATE  : old_value non-empty, new_value non-empty, membership proof for old leaf
 *   DELETE  : old_value non-empty, new_value empty,     membership proof for old leaf
 *   INSERT  : old_value empty,     new_value non-empty, non-membership proof (witness fields)
 *   INIT    : old_value empty,     new_value non-empty, proof empty, no witness (empty tree)
 *
 * @start
 * @next AuthDbUpdateLeafResponse
 * @next Failure
 */
message AuthDbUpdateLeaf {
    required bytes  address         = 1;  // key to update
    required bytes  old_value       = 2;  // current value; empty means address is absent
    required bytes  new_value       = 3;  // new value; empty means delete
    repeated bytes  proof           = 4;  // proof for old state (33 bytes each, leaf-to-root)
    optional bytes  witness_address = 5;  // non-membership witness address (INSERT only)
    optional bytes  witness_value   = 6;  // non-membership witness value   (INSERT only)
    optional bytes  mac             = 7;  // HMAC-SHA256(slip21_key, address‖new_value) — skips confirmation
    optional bytes  device_id       = 8;  // identifier matching the MAC key owner
}

/**
 * Response: New counter and (optionally) the newly computed root.
 * @end
 */
message AuthDbUpdateLeafResponse {
    required uint32 counter    = 1;  // monotonic counter after this update
    optional bytes  new_root   = 2;  // absent if the tree is now empty
    optional bytes  wallet_id  = 3;  // SLIP21(seed-without-passphrase, "AUTHDB DEVICE ID"), scopes the tree
    optional bytes  mac        = 4;  // HMAC(mac_key, wallet_id||counter||new_root); absent if tree is now
                                      // empty. A root-attestation token -- see AuthDbFastForwardRoot.
    optional bytes  auth_mac   = 5;  // HMAC(device_key, old_leafHash||new_leafHash); set in debug/auto_approve mode
}

/**
 * Request: Pre-authorize an address+old_value->new_value transition on-screen
 * so a future AuthDbUpdateLeaf call can skip the confirmation dialog when it
 * supplies the returned MAC. old_value/new_value use the same empty=absent
 * convention as AuthDbUpdateLeaf (empty old_value = INSERT/INIT, empty
 * new_value = DELETE).
 * @start
 * @next AuthDbApproveResponse
 * @next Failure
 */
message AuthDbApprove {
    required bytes address   = 1;  // address to authorize
    required bytes new_value = 2;  // value to authorize at that address; empty = delete
    optional bytes old_value = 3;  // current value being replaced; empty/absent = address was absent
}

/**
 * Response: MAC token authorizing the update_leaf call for this exact
 * address/old_value/new_value transition.
 * @end
 */
message AuthDbApproveResponse {
    required bytes mac        = 1;  // HMAC(mac_key, leaf_hash(address,old_value)||leaf_hash(address,new_value))
                                     // -- same formula AuthDbUpdateLeaf verifies against.
    optional bytes wallet_id  = 2;  // SLIP21(seed-without-passphrase, "AUTHDB DEVICE ID"), scopes the tree
}

/**
 * Request: Wipe the stored Merkle root and reset the counter to zero.
 * DEBUG ONLY: rejected on production firmware.
 * @start
 * @next AuthDbClearRootResponse
 * @next Failure
 */
message AuthDbClearRoot {
}

/**
 * Response: Confirmation that root and counter were cleared.
 * @end
 */
message AuthDbClearRootResponse {
    optional bytes wallet_id  = 1;  // SLIP21(seed-without-passphrase, "AUTHDB DEVICE ID"), scopes the tree
}

/**
 * Request: Store (or replace) the offline-cache entry for one address.
 * Stores label and/or data_mac; absent fields are cleared.
 * @start
 * @next AuthDbSetCacheEntryResponse
 * @next Failure
 */
message AuthDbSetCacheEntry {
    required bytes  address  = 1;  // key whose cache entry is being set
    optional string label    = 2;  // human-readable label; absent = clear label
    optional bytes  data_mac = 3;  // MAC authorizing the data field; absent = clear
}

/**
 * Response: Confirmation that the cache entry was stored.
 * @end
 */
message AuthDbSetCacheEntryResponse {
    required uint32 identifier_crc = 1;  // low 4 bytes of device_id, for sanity-check
}

/**
 * Request: Retrieve the offline-cache entry for one address.
 * @start
 * @next AuthDbGetCacheEntryResponse
 * @next Failure
 */
message AuthDbGetCacheEntry {
    required bytes address = 1;
}

/**
 * Response: Cache entry (or not-found).
 * @end
 */
message AuthDbGetCacheEntryResponse {
    required bool   found    = 1;
    optional string label    = 2;
    optional bytes  data_mac = 3;
}

/**
 * Embedded: one entry returned by AuthDbGetAllCache.
 */
message AuthDbGetAllCacheEntry {
    required bytes  address  = 1;
    optional string label    = 2;
    optional bytes  data_mac = 3;
}

/**
 * Request: Return all offline-cache entries (for sync after reconnect).
 * @start
 * @next AuthDbGetAllCacheResponse
 * @next Failure
 */
message AuthDbGetAllCache {
}

/**
 * Response: All cached entries.
 * @end
 */
message AuthDbGetAllCacheResponse {
    repeated AuthDbGetAllCacheEntry entries = 1;
}

/**
 * Request: Wipe all offline-cache entries from the device.
 * @start
 * @next AuthDbWipeCacheResponse
 * @next Failure
 */
message AuthDbWipeCache {
}

/**
 * Response: Confirmation that the cache was wiped.
 * @end
 */
message AuthDbWipeCacheResponse {
}

/**
 * Request: Override the device_id used for storage and MAC keying.
 * DEBUG ONLY: rejected on production firmware.
 * @start
 * @next AuthDbSetDeviceIdResponse
 * @next Failure
 */
message AuthDbSetDeviceId {
    required bytes device_id = 1;  // 32 bytes to inject as device_id
}

/**
 * Response: Echoes the injected device_id.
 * @end
 */
message AuthDbSetDeviceIdResponse {
    required bytes device_id = 1;
}

/**
 * Embedded: one entry of the on-device offline operation queue, as returned
 * by AuthDbGetOfflineOperations. `mac` is HMAC(device_key, sequence ||
 * old_leaf_hash || new_leaf_hash) -- the sequence number is part of the MAC
 * preimage so a rebased operation cannot be replayed under a different
 * (attacker-chosen) sequence number, which would otherwise let a malicious
 * host inflate last_applied_sequence and cause AuthDbDeleteOfflineOperations
 * to discard operations that were never actually applied.
 */
message AuthDbOfflineOperation {
    required uint32 sequence  = 1;  // monotonic per-wallet, assigned by the device
    required bytes  address   = 2;
    optional bytes  old_value = 3;  // empty/absent = address was absent (INSERT) when queued
    optional bytes  new_value = 4;  // empty/absent = delete
    required bytes  mac       = 5;  // HMAC(device_key, sequence||old_leafHash||new_leafHash)
}

/**
 * Request: Create a signed offline operation and append it to the on-device
 * queue. Used when the host database is unreachable. Does not touch the
 * Merkle root -- the operation is only applied later via
 * AuthDbApplyOfflineOperations, after the host has rebased it against the
 * current canonical tree and supplied a Merkle proof.
 * @start
 * @next AuthDbQueueOfflineOperationResponse
 * @next Failure
 */
message AuthDbQueueOfflineOperation {
    required bytes address   = 1;
    required bytes old_value = 2;  // empty = address absent (INSERT)
    required bytes new_value = 3;  // empty = delete
}

/**
 * Response: The assigned sequence number and MAC for the newly queued
 * operation.
 * @end
 */
message AuthDbQueueOfflineOperationResponse {
    required uint32 sequence   = 1;
    required bytes  mac        = 2;
    optional bytes  wallet_id  = 3;
}

/**
 * Request: Return the current root/counter plus every operation currently
 * queued for this wallet, for upload to the host database.
 * @start
 * @next AuthDbGetOfflineOperationsResponse
 * @next Failure
 */
message AuthDbGetOfflineOperations {
}

/**
 * Response: Current state plus the full offline queue (FIFO order).
 * @end
 */
message AuthDbGetOfflineOperationsResponse {
    optional bytes  current_root = 1;  // absent if tree is empty
    required uint32 counter      = 2;
    optional bytes  wallet_id    = 3;
    repeated AuthDbOfflineOperation operations = 4;
}

/**
 * Embedded: one operation rebased by the host against the current canonical
 * root, ready to be verified and applied on-device. `sequence`, `address`,
 * `old_value`, `new_value` and `mac` must be forwarded byte-for-byte from the
 * original AuthDbOfflineOperation -- rebase may choose whether to forward an
 * operation, never alter its signed fields. `proof`/`witness_*` are freshly
 * computed by the host against the root the operation will actually be
 * applied to.
 */
message AuthDbRebasedOperation {
    required uint32 sequence        = 1;
    required bytes  address         = 2;
    optional bytes  old_value       = 3;
    optional bytes  new_value       = 4;
    required bytes  mac             = 5;
    repeated bytes  proof           = 6;
    optional bytes  witness_address = 7;
    optional bytes  witness_value   = 8;
}

/**
 * Request: Apply a batch of rebased offline operations. The device is the
 * sole authority for the resulting root: for every operation it independently
 * verifies the MAC (proves the operation was genuinely queued under the
 * current wallet, for this exact sequence and leaf transition), verifies
 * the supplied proof against its own current root, and then COMPUTES the new
 * root itself from (address, old_value, new_value, proof) exactly as
 * AuthDbUpdateLeaf does -- the host never supplies a root directly.
 *
 * Operations are processed strictly in ascending sequence order starting
 * from the device's own persisted last_applied_sequence; processing stops at
 * the first operation that fails its MAC/proof check (conflict) or is not
 * the immediate next sequence, so committed state can never skip over an
 * unresolved conflict.
 * @start
 * @next AuthDbApplyOfflineOperationsResponse
 * @next Failure
 */
message AuthDbApplyOfflineOperations {
    repeated AuthDbRebasedOperation operations = 1;
}

/**
 * Response: How many operations were actually applied plus the resulting
 * state. last_applied_sequence is persisted by the device itself and is the
 * only input AuthDbDeleteOfflineOperations trusts for garbage collection.
 * @end
 */
message AuthDbApplyOfflineOperationsResponse {
    required uint32 applied_count         = 1;
    optional bytes  new_root              = 2;  // absent if tree is now empty
    required uint32 counter               = 3;
    required uint32 last_applied_sequence = 4;
    optional bytes  wallet_id             = 5;
    optional bytes  root_mac              = 6;  // HMAC(mac_key, wallet_id||counter||new_root);
                                                 // absent if tree is now empty. A root-attestation
                                                 // token: since mac_key is derived from the wallet's
                                                 // seed (not the physical device), this token can be
                                                 // replayed via AuthDbFastForwardRoot on ANY physical
                                                 // device holding the same wallet to fast-forward it
                                                 // to this exact state, without replaying every
                                                 // individual operation.
}

/**
 * Request: Delete every queued operation with sequence <= the device's own
 * last_applied_sequence. Deliberately takes NO input from the host: garbage
 * collection must never trust a host-supplied watermark, since an
 * un-applied operation deleted on that basis would be permanently and
 * silently lost (the offline queue is the only copy before the host commits
 * it).
 * @start
 * @next AuthDbDeleteOfflineOperationsResponse
 * @next Failure
 */
message AuthDbDeleteOfflineOperations {
}

/**
 * Response: How many entries were deleted and how many remain queued.
 * @end
 */
message AuthDbDeleteOfflineOperationsResponse {
    required uint32 deleted_count   = 1;
    required uint32 remaining_count = 2;
}

/**
 * Request: Fast-forward this wallet's root directly to a state a device has
 * already attested to, skipping replay of individual operations.
 *
 * `mac` MUST be a root-attestation token previously issued by THIS OR ANY
 * OTHER physical device holding the same wallet (AuthDbUpdateLeafResponse.mac
 * or AuthDbApplyOfflineOperationsResponse.root_mac) -- mac_key is derived
 * from the wallet's seed, not the physical device, so it is intentionally
 * interoperable across every device that has unlocked this exact wallet.
 * This is NOT a host-originated signature: Suite can only replay a
 * (wallet_id, counter, new_root) triple some device already vouched for, it
 * cannot mint a new one. `counter` and `wallet_id` are bound INSIDE the mac
 * preimage specifically so a host cannot pair a genuine old attestation with
 * a forged, unauthenticated higher counter to bypass the monotonicity check
 * below -- the device only trusts the counter it decodes from inside the
 * verified mac, never a bare sibling field.
 *
 * The device rejects unless `counter` is strictly greater than its own
 * currently stored counter for this wallet_id (anti-rollback; still permits
 * skipping intermediate states the caller doesn't have -- see
 * docs/authdb.md's open-question note on reconciling this with an
 * in-flight, not-yet-drained offline queue).
 * @start
 * @next AuthDbFastForwardRootResponse
 * @next Failure
 */
message AuthDbFastForwardRoot {
    required bytes  new_root  = 1;  // 32-byte target Merkle root
    required uint32 counter   = 2;  // must be > this wallet's current counter
    required bytes  wallet_id = 3;  // must match the currently active wallet_id
    required bytes  mac       = 4;  // HMAC(mac_key, wallet_id||counter||new_root)
}

/**
 * Response: Confirmation that the root/counter were fast-forwarded.
 * @end
 */
message AuthDbFastForwardRootResponse {
    required uint32 counter   = 1;  // now-stored counter (equals request's counter)
    optional bytes  new_root  = 2;  // now-stored root
    optional bytes  wallet_id = 3;
}
