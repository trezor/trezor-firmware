syntax = "proto2";
package hw.trezor.messages.authdb;

// Sugar for easier handling in Java
option java_package = "com.satoshilabs.trezor.lib.protobuf";
option java_outer_classname = "TrezorMessageAuthDb";

// AuthDB exposes four online interfaces: AuthDbInit (initialization),
// AuthDbSetRoot (setroot), AuthDbLookup (dblookup) and AuthDbUpdateLeaf
// (dbchange). The offline-queue / sync / cache / pre-approval / fast-forward
// interfaces were removed (their MessageType ids 2308-2329 are reserved, see
// messages.proto).

/**
 * Request: Initialize the device's trusted AuthDB state from untrusted host storage.
 *
 * The host has no authority of its own; it merely relays two things the device can
 * verify on its own:
 *   1. The latest counter from the Quota Manager (QM), signed by the QM. The device
 *      verifies the signature against its provisioned QM public key (Ed25519) and
 *      stores the value as qm_last_counter -- the anti-rollback ceiling. The signature
 *      covers b"AUTHDB QM v1" || wallet_id || qm_counter(4B BE), so it is bound to this
 *      specific hidden wallet and cannot be replayed onto another wallet or device.
 *   2. The latest root (from Evolu), together with the counter it was attested at and
 *      the device-produced root_mac. Supplied only if the wallet already has a root.
 *      The device verifies counter == qm_last_counter (the QM and the stored root agree
 *      on where the wallet is) and that root_mac == HMAC(root_mac_key, wallet_id ||
 *      counter || root) -- i.e. that THIS device produced the root. Only then is the
 *      root installed.
 * @start
 * @next AuthDbInitResponse
 * @next Failure
 */
message AuthDbInit {
    required uint32 qm_counter    = 1;  // latest counter reported by the Quota Manager
    required bytes  qm_signature  = 2;  // Ed25519 sig over b"AUTHDB QM v1"||wallet_id||qm_counter(4B BE)
    optional bytes  root          = 3;  // 32-byte root from Evolu; absent for a fresh wallet
    optional uint32 counter       = 4;  // counter the root was attested at; required with root
    optional bytes  root_mac      = 5;  // HMAC(root_mac_key, wallet_id||counter||root); required with root
}

/**
 * Response: The device's trusted state after initialization.
 * @end
 */
message AuthDbInitResponse {
    required uint32 qm_last_counter = 1;  // stored anti-rollback ceiling (== qm_counter)
    optional bytes  wallet_id       = 2;  // SLIP21(seed-without-passphrase, "AUTHDB DEVICE ID"), scopes the tree
    optional uint32 counter         = 3;  // current root counter after init
    optional bytes  root            = 4;  // current root; absent if the tree is empty
    optional bytes  root_mac        = 5;  // HMAC(root_mac_key, wallet_id||counter||root); absent if empty
}

/**
 * Request: Install a (root, counter) state attested by a device-produced MAC.
 *
 * `mac` is REQUIRED. Two cases:
 *   - `mac` == 32 zero bytes: a plain unauthenticated root injection, accepted
 *     ONLY on debug builds (increments the counter by 1, ignores counter/device_id);
 *     rejected on production firmware.
 *   - Any other `mac`: `device_id` must equal this wallet's wallet_id, `counter`
 *     must be strictly greater than the currently stored counter (anti-rollback),
 *     and `mac` must equal HMAC(root_mac_key, wallet_id||counter||root). The only
 *     way to obtain a verifying mac is to already hold one a device itself produced
 *     (AuthDbUpdateLeafResponse.mac), so this is safe on production firmware.
 * @start
 * @next AuthDbSetRootResponse
 * @next Failure
 */
message AuthDbSetRoot {
    required bytes  root       = 1;  // 32-byte Merkle root to install
    required bytes  mac        = 2;  // required; all-zero accepted only in debug builds
    optional bytes  device_id  = 3;  // must equal wallet_id when mac is non-zero
    optional uint32 counter    = 4;  // target counter; required when mac is non-zero
}

/**
 * Response: Confirmation that the root/counter were installed.
 * @end
 */
message AuthDbSetRootResponse {
    required uint32 counter   = 1;  // counter after install
    optional bytes  wallet_id = 2;  // SLIP21(seed-without-passphrase, "AUTHDB DEVICE ID"), scopes the tree
    optional bytes  new_root  = 3;  // installed root; absent if tree is empty
    optional bytes  root_mac  = 4;  // HMAC(root_mac_key, wallet_id||counter||new_root); absent if tree is empty
}

/**
 * Request: Verify a Merkle Patricia Trie proof for a (address, value) pair.
 *
 * Membership proof (witness_address absent):
 *   Verify that (address, value) is in the tree with the stored root.
 *
 * Non-membership proof (witness_address present):
 *   Verify that address is NOT in the tree by proving a witness leaf (witness_address,
 *   witness_value) that occupies address's path.  The device checks:
 *     1. witness is in the tree (membership proof for witness against stored root)
 *     2. witness_address != address
 *     3. witness_address and address share all bit-positions that appear in proof
 *   If the proof list is empty and witness_address is absent, the tree is empty.
 *
 * @start
 * @next AuthDbLookupResponse
 * @next Failure
 */
message AuthDbLookup {
    required bytes  address         = 1;  // key whose SHA-256 determines the tree path
    optional bytes  value           = 2;  // value stored at address (required for membership)
    repeated bytes  proof           = 3;  // sibling hashes, leaf-to-root order (33 bytes each)
    optional bytes  witness_address = 4;  // non-membership: witness leaf address
    optional bytes  witness_value   = 5;  // non-membership: witness leaf value
    optional uint32 counter         = 6;  // leaf counter for address (required for membership)
    optional uint32 witness_counter = 7;  // leaf counter for witness_address (non-membership)
}

/**
 * Response: Verification result together with the current counter.
 * @end
 */
message AuthDbLookupResponse {
    required bool   valid      = 1;  // true if proof is valid against stored root
    required uint32 counter    = 2;  // current global counter
    optional bool   membership = 3;  // true = membership proof, false = non-membership
    optional bytes  wallet_id  = 4;  // SLIP21(seed-without-passphrase, "AUTHDB DEVICE ID"), scopes the tree
}

/**
 * Request: Atomically update a leaf in the Merkle tree.
 *
 * The device verifies old_value is the current value at address (or the address is absent
 * when old_value is empty), then computes and stores the new root, incrementing the global
 * root counter by 1.
 *
 * Supported operations:
 *   UPDATE  : old_value non-empty, new_value non-empty, membership proof for old leaf
 *   DELETE  : old_value non-empty, new_value empty,     membership proof for old leaf
 *   INSERT  : old_value empty,     new_value non-empty, non-membership proof (witness fields)
 *   INIT    : old_value empty,     new_value non-empty, proof empty, no witness (empty tree)
 *
 * The leaf hash is sha256d(0x00||address||counter(4B BE)||value). counter is the GLOBAL
 * root counter stamped onto the leaf on change: new_counter must equal the new global
 * counter (current root counter + 1); old_counter is the changed leaf's previous stamp.
 * @start
 * @next AuthDbUpdateLeafResponse
 * @next Failure
 */
message AuthDbUpdateLeaf {
    required bytes  address         = 1;  // key to update
    required bytes  old_value       = 2;  // current value; empty means address is absent
    required bytes  new_value       = 3;  // new value; empty means delete
    repeated bytes  proof           = 4;  // proof for old state (33 bytes each, leaf-to-root)
    optional bytes  witness_address = 5;  // non-membership witness address (INSERT only)
    optional bytes  witness_value   = 6;  // non-membership witness value   (INSERT only)
    optional uint32 old_counter     = 9;  // previous global stamp of the leaf; absent/0 on INSERT/INIT
    required uint32 new_counter     = 10; // new global counter stamped onto the leaf (current root counter + 1)
    optional uint32 witness_counter = 11; // global stamp of witness_value (INSERT only)
    // field ids 7 (mac) and 8 (device_id) removed with the pre-approval (AuthDbApprove) path
}

/**
 * Response: New global counter, the newly computed root, and a root-attestation MAC.
 * The (new_root, counter, mac) triple is stored by the host and is a self-contained,
 * verifiable attestation (it is what AuthDbSetRoot verifies when re-installing a root).
 * @end
 */
message AuthDbUpdateLeafResponse {
    required uint32 counter   = 1;  // global counter after this update (previous + 1)
    optional bytes  new_root  = 2;  // absent if the tree is now empty
    optional bytes  wallet_id = 3;  // SLIP21(seed-without-passphrase, "AUTHDB DEVICE ID"), scopes the tree
    optional bytes  mac       = 4;  // HMAC(root_mac_key, wallet_id||counter||new_root); absent if tree is now empty
}
