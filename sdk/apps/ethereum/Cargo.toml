cargo-features = ["panic-immediate-abort"]

[package]
name = "ethereum"
version = "0.1.0"
edition = "2024"

[package.metadata.trezor]
id = "ethereum.trezor.com"
name = "Ethereum"
vendor = "SatoshiLabs"
stack-size = 16384
heap-size = 1024
app-ring = 0
curves = ["secp256k1"]
paths = [
    # "44'/60'/account'",
    # "45'/60/account",

    # https://github.com/bitcoin/bips/blob/master/bip-0044.mediawiki
    # The BIP44 pattern, overloaded to be used for ETH accounts, as described above
    "m/44'/coin_type'/0'/0/account",
    # BIP-44 for basic (legacy) Bitcoin accounts, and widely used for other currencies:
    # https://github.com/bitcoin/bips/blob/master/bip-0044.mediawiki
    "m/44'/coin_type'/account'/change/address_index/**",
    # SEP-0005 for non-UTXO-based currencies, defined by Stellar:
    # https://github.com/stellar/stellar-protocol/blob/master/ecosystem/sep-0005.md
    "m/44'/coin_type'/account'",
    # SEP-0005 Ledger Live legacy path
    # https://github.com/trezor/trezor-firmware/issues/1749
    "m/44'/coin_type'/0'/account",
    # CASA pattern
    "m/45'/coin_type/account/change/address_index",
]

[dependencies]
trezor-app-sdk = { path = "../../crates/trezor-app-sdk" }
prost = { version = "0.14.1", default-features = false, features = ["derive"] }
ufmt = { version = "0.2.0", default-features = false }
primitive-types = { version = "0.14.0", default-features = false }
bs58 = { version = "0.5", default-features = false, features = ["alloc"] }

[build-dependencies]
prost-build = "0.14.1"
serde = { version = "=1.0.145", features = ["derive"] }
serde_json = "1"


[features]
# --------------------------------------------------------------------------
# Model features
# --------------------------------------------------------------------------
model_t3t1 = []
model_t3w1 = []

# --------------------------------------------------------------------------
# Language features
# --------------------------------------------------------------------------
lang_en = []
lang_cs = []

# --------------------------------------------------------------------------
# Log level features
# --------------------------------------------------------------------------
log_level_error = ['trezor-app-sdk/log_level_error']
log_level_warn = ['trezor-app-sdk/log_level_warn']
log_level_info = ['trezor-app-sdk/log_level_info']
log_level_debug = ['trezor-app-sdk/log_level_debug']

# --------------------------------------------------------------------------
# Selectable features
# --------------------------------------------------------------------------
emulator = []
test = ["dev_keys", 'trezor-app-sdk/test', 'trezor-app-sdk/log_level_debug']
debug = ['trezor-app-sdk/debug']

# --------------------------------------------------------------------------
# Automatically derived features (do not enable from outside)
# --------------------------------------------------------------------------
dev_keys = []
