[alias]
xtask = "run --manifest-path ./xtask/Cargo.toml --"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "relocation-model=pic"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "relocation-model=pic", "-C", "link-arg=-Wl,-export_dynamic"]

[target.thumbv8m.main-none-eabihf]
linker = "rust-lld"
rustflags = [
    "-C",
    "relocation-model=ropi-rwpi",
    "-C",
    "link-arg=-Tmemory.x",
    "-C",
    "link-arg=--emit-relocs",
    "-C",
    "link-arg=-z",
    "-C",
    "link-arg=max-page-size=0x20",
    "-C",
    "link-arg=--no-dynamic-linker",
]
