cargo-features = ["panic-immediate-abort"]

[package]
name = "funnycoin_rust"
version = "0.1.0"
edition = "2024"

[profile.dev]
panic = "abort"
split-debuginfo = "off"
debug = 2
strip = "none"


[profile.release]
panic = "immediate-abort"
opt-level = "z"
lto = "fat"
codegen-units = 1
split-debuginfo = "off"
debug = 0
debug-assertions = false
overflow-checks = false
incremental = false


[profile.test]
split-debuginfo = "off"
debug = 2


[dependencies]
trezor-app-sdk = { path = "../../crates/trezor-app-sdk" }
emballoc = "0.3.0"
prost = { version = "0.14.1", default-features = false, features = ["derive"] }
ufmt = { version = "0.2.0", default-features = false }

[build-dependencies]
prost-build = "0.14.1"
serde = { version = "=1.0.145", features = ["derive"] }
serde_json = "1"

[features]
# --------------------------------------------------------------------------
# Model features
# --------------------------------------------------------------------------
model_t3t1 = []
model_t3w1 = []

# --------------------------------------------------------------------------
# Language features
# --------------------------------------------------------------------------
lang_en = []
lang_cs = []

# --------------------------------------------------------------------------
# Log level features
# --------------------------------------------------------------------------
log_level_error = ['trezor-app-sdk/log_level_error']
log_level_warn = ['trezor-app-sdk/log_level_warn']
log_level_info = ['trezor-app-sdk/log_level_info']
log_level_debug = ['trezor-app-sdk/log_level_debug']
log_level_trace = ['trezor-app-sdk/log_level_trace']

# --------------------------------------------------------------------------
# Selectable features
# --------------------------------------------------------------------------
emulator = ["debug"]
test = ["dev_keys", 'trezor-app-sdk/test', 'trezor-app-sdk/log_level_trace']
debug = ['trezor-app-sdk/debug']

# --------------------------------------------------------------------------
# Automatically derived features (do not enable from outside)
# --------------------------------------------------------------------------
dev_keys = []
