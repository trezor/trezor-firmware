[project]
name = "funnycoin-rust"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10, <4"


[dependency-groups]

dev = [
    "pytest>=8.4.1",
    "pytest-ordering",
    "pytest-random-order",
    "pytest-timeout",
    "pytest-xdist",
    "Pillow>=11",
    "protobuf==6.33.5",    # minor needs to be >= than version in shell.nix
    "trezor",
    "dominate",
    "requests>=2.32.5",
    "mako>=1.0.7,<2",
    "click>=8,<9",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q --random-order -x"
markers = ["spawn: must run first (bootstrap test)"]

[tool.uv.sources]
trezor = { path = "../../../python", editable = true }
