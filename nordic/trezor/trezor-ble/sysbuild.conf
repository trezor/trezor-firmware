# Sysbuild configuration file.

# Enable MCUboot
SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_MCUBOOT_MODE_SINGLE_APP=y
# Single-slot: app has no secondary slot, no OTA image management
SB_CONFIG_MCUBOOT_APP_SYNC_UPDATEABLE_IMAGES=n

# Use DTS fixed-partitions instead of pm_static.yml
SB_CONFIG_PARTITION_MANAGER=n

# nrf54l series defaults SHA512 for ED25519; override to use SHA256 instead.
# sysbuild CMakeLists.txt reads SB_CONFIG_BOOT_IMG_HASH_ALG_SHA512 and injects
# CONFIG_BOOT_IMG_HASH_ALG_SHA512=y into MCUboot, overriding sysbuild/mcuboot.conf.
# Setting it to n here lets CONFIG_BOOT_IMG_HASH_ALG_SHA256=y in mcuboot.conf win.
SB_CONFIG_BOOT_IMG_HASH_ALG_SHA512=n
